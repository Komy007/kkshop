name: Build & Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: kkshop-487905
  SERVICE_NAME: kkshop
  REGION: asia-southeast1
  IMAGE: gcr.io/kkshop-487905/kkshop

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ─────────────────────────────────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Docker Login to GCR via service account key ──────────────────
      - name: Login to Google Container Registry
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: _json_key_base64
          password: ${{ secrets.GCP_SA_KEY }}

      # ── 5. Sync database schema ─────────────────────────────────────────
      - name: Sync database schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          npm install --legacy-peer-deps
          npx prisma db push --skip-generate

      # ── 6. Build Docker image ────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      # ── 7. Push image to Google Container Registry ───────────────────────
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 7. Deploy to Cloud Run ────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},DIRECT_URL=${{ secrets.DIRECT_URL }},AUTH_SECRET=${{ secrets.AUTH_SECRET }},AUTH_TRUST_HOST=true,AUTH_URL=https://kkshop.cc,NEXTAUTH_URL=https://kkshop.cc,GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --quiet

      # ── 8. Clean up old GCR images (keep latest 5) ───────────────────────
      - name: Clean up old container images
        run: |
          DIGESTS=$(gcloud container images list-tags ${{ env.IMAGE }} \
            --format='get(digest)' \
            --sort-by='~TIMESTAMP' \
            --limit=999 2>/dev/null | tail -n +6)
          if [ -n "$DIGESTS" ]; then
            echo "Deleting old GCR images..."
            while IFS= read -r DIGEST; do
              D=$(echo "$DIGEST" | tr -d '\r\n ')
              [ -n "$D" ] && gcloud container images delete "${{ env.IMAGE }}@${D}" \
                --force-delete-tags --quiet 2>/dev/null || true
            done <<< "$DIGESTS"
            echo "GCR cleanup done."
          else
            echo "No old images to clean up."
          fi

      # ── 9. Clean up old Cloud Run revisions (keep latest 5) ──────────────
      - name: Clean up old Cloud Run revisions
        run: |
          REVISIONS=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='get(name)' \
            --sort-by='~createTime' \
            --limit=999 2>/dev/null | tail -n +6)
          if [ -n "$REVISIONS" ]; then
            echo "Deleting old revisions..."
            while IFS= read -r REV; do
              R=$(echo "$REV" | tr -d '\r\n ')
              [ -n "$R" ] && gcloud run revisions delete "$R" \
                --region=${{ env.REGION }} --quiet 2>/dev/null || true
            done <<< "$REVISIONS"
            echo "Revision cleanup done."
          else
            echo "No old revisions to clean up."
          fi

      # ── 11. Show deployment URL ───────────────────────────────────────────
      - name: Deployment complete
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)' 2>/dev/null || echo "https://kkshop-580694915945.asia-southeast1.run.app")
          echo "✅ Deployed to: $URL"
