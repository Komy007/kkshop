name: Build & Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: kkshop-487905
  SERVICE_NAME: kkshop
  REGION: asia-southeast1
  IMAGE: gcr.io/kkshop-487905/kkshop

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ─────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Configure Docker to use GCR ──────────────────────────────────
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # ── 5. Build Docker image ────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --cache-from ${{ env.IMAGE }}:latest \
            .

      # ── 6. Push image to Google Container Registry ───────────────────────
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 7. Deploy to Cloud Run ────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},DIRECT_URL=${{ secrets.DIRECT_URL }},AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
            --quiet

      # ── 8. Clean up old GCR images (keep latest 5 only) ──────────────────
      - name: Clean up old container images
        run: |
          # List all image digests except the 5 most recent, then delete them
          DIGESTS=$(gcloud container images list-tags ${{ env.IMAGE }} \
            --format='get(digest)' \
            --sort-by='~TIMESTAMP' \
            --limit=999 \
            | tail -n +6)

          if [ -n "$DIGESTS" ]; then
            echo "Deleting old images..."
            for DIGEST in $DIGESTS; do
              gcloud container images delete "${{ env.IMAGE }}@${DIGEST}" \
                --force-delete-tags --quiet || true
            done
          else
            echo "No old images to clean up."
          fi

      # ── 9. Show deployment URL ────────────────────────────────────────────
      - name: Get deployed service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "✅ Deployed to: $URL"
